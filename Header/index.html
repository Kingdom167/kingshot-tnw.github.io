<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Night's Watch</title>
  
  <!-- Google Fonts for Epic Fantasy Typography -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Cormorant+Garamond:ital,wght@1,400;1,600&display=swap" rel="stylesheet">

  <style>
    /* Reset & Base Styles */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background-color: #050c16;
      font-family: 'Cormorant Garamond', serif;
      overflow-x: hidden;
    }

    /* Top Navigation Banner */
    .top-banner {
      background-color: #02060c;
      width: 100%;
      padding: 15px 40px;
      display: flex;
      align-items: center;
      gap: 20px;
      /* The single crisp white/ice-blue separating line at the bottom */
      border-bottom: 1px solid rgba(147, 197, 253, 0.4);
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
    }

    .banner-logo {
      height: 45px;
      width: auto;
      /* Uses the requested invert(1) filter to change the white logo to dark/black */
      filter: invert(1) drop-shadow(0 0 5px rgba(0, 0, 0, 0.5));
    }

    .banner-title {
      font-family: 'Cinzel', serif;
      font-weight: 400;
      font-size: 1.3rem;
      letter-spacing: 0.35em;
      color: #cbd5e1;
      text-shadow: 0 2px 4px rgba(0, 0, 0, 0.5);
    }

    /* Main Header Container */
    .nights-watch-header {
      position: relative;
      width: 100%;
      min-height: calc(100vh - 76px); /* Adjusts for the top banner height */
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 60px 20px;
      color: #e0f2fe; /* Soft ice-blue text */
      
      /* Background Image Layering with a dark overlay for legibility */
      background: linear-gradient(to bottom, rgba(10, 25, 41, 0.2), rgba(5, 12, 22, 0.85)), 
                  url('https://cdn.discordapp.com/attachments/605031846459342868/1525507449493131384/IMG_7388.png?ex=6a53a306&is=6a525186&hm=c23355799b1d0153c0f4ee874703fb7046ba867dc844cdd9e3475e5b49d99a59&');
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
    }

    /* Content Wrapper */
    .header-content {
      max-width: 680px;
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* Main Center Logo Styling */
    .header-logo {
      width: 160px;
      height: auto;
      margin-bottom: 45px;
      /* Keeping this logo inverted as requested in the previous step */
      filter: invert(1) drop-shadow(0 0 10px rgba(0, 0, 0, 0.6));
    }

    /* Subtitle / Est. text */
    .header-est {
      font-family: 'Cinzel', serif;
      font-size: 0.85rem;
      letter-spacing: 0.45em;
      color: #93c5fd;
      margin-bottom: 30px;
      text-shadow: 0 2px 4px rgba(0, 0, 0, 0.6);
    }

    /* Main Title */
    .header-title {
      font-family: 'Cinzel', serif;
      font-weight: 700;
      font-size: 3.8rem;
      line-height: 1.15;
      letter-spacing: 0.05em;
      margin: 0 0 35px 0;
      color: #f0fdf4;
      text-shadow: 0 4px 12px rgba(0, 0, 0, 0.9), 0 0 25px rgba(147, 197, 253, 0.2);
    }

    /* Quote Block */
    .header-quote {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: 1.65rem;
      color: #cbd5e1;
      margin: 0 0 30px 0;
      text-shadow: 0 2px 4px rgba(0, 0, 0, 0.7);
    }

    /* Body Description */
    .header-desc {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.3rem;
      line-height: 1.65;
      color: #94a3b8;
      margin-bottom: 55px;
      max-width: 560px;
      text-shadow: 0 2px 6px rgba(0, 0, 0, 0.9);
    }

    /* Button Styling */
    .header-btn {
      font-family: 'Cinzel', serif;
      font-size: 0.9rem;
      letter-spacing: 0.3em;
      color: #93c5fd;
      text-decoration: none;
      padding: 15px 45px;
      border: 1px solid rgba(147, 197, 253, 0.35);
      background: rgba(10, 25, 41, 0.4);
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
      transition: all 0.3s ease;
    }

    .header-btn:hover {
      background: rgba(147, 197, 253, 0.15);
      border-color: #93c5fd;
      color: #ffffff;
      box-shadow: 0 0 20px rgba(147, 197, 253, 0.3);
    }

    /* Responsive adjustments for mobile screens */
    @media (max-width: 600px) {
      .top-banner { padding: 12px 20px; gap: 15px; }
      .banner-logo { height: 35px; }
      .banner-title { font-size: 1rem; letter-spacing: 0.25em; }
      .header-title { font-size: 2.5rem; }
      .header-quote { font-size: 1.4rem; }
      .header-desc { font-size: 1.15rem; }
      .header-logo { width: 130px; margin-bottom: 30px; }
      .header-est { letter-spacing: 0.3em; font-size: 0.75rem; }
    }
  </style>
</head>
<body>

  <!-- New Top Banner -->
  <div class="top-banner">
    <img src="https://cdn.discordapp.com/attachments/605031846459342868/1525507449795379360/IMG_7384.png?ex=6a53a306&is=6a525186&hm=05ef4ad05212870f67eae620b788647866452e2fd18b7c592cbf52f0808088ec&" alt="Logo" class="banner-logo">
    <span class="banner-title">THE NIGHT'S WATCH</span>
  </div>

  <!-- Main Website Section -->
  <header class="nights-watch-header">
    <div class="header-content">
      <!-- Inverted Center Raven Logo -->
      <img src="https://cdn.discordapp.com/attachments/605031846459342868/1525507449795379360/IMG_7384.png?ex=6a53a306&is=6a525186&hm=05ef4ad05212870f67eae620b788647866452e2fd18b7c592cbf52f0808088ec&" alt="Night's Watch Logo" class="header-logo">
      
      <!-- Subtitle -->
      <p class="header-est">EST. 8000 YEARS BEFORE THE CONQUEST</p>
      
      <!-- Main Title -->
      <h1 class="header-title">THE NIGHT'S<br>WATCH</h1>
      
      <!-- Quote -->
      <blockquote class="header-quote">“And now his watch is ended.”</blockquote>
      
      <!-- Description -->
      <p class="header-desc">
        We are the sworn brothers of the Wall — an alliance forged in the long night, bound by oath, standing between the realms of men and the darkness beyond.
      </p>
      
      <!-- Action Button -->
      <a href="#join" class="header-btn">TAKE THE BLACK</a>
    </div>
  </header>

</body>
</html>
